spring.application.name=quantity-measurement-app

# ===============================
# H2 DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:h2:mem:quantity_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# H2 CONSOLE
# ===============================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# LOGGING
# ===============================

logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# SWAGGER / OPENAPI
# ===============================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===============================
# ACTUATOR
# ===============================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always



# ===============================
# GOOGLE OAUTH2 CLIENT CONFIGURATION
# ===============================
spring.security.oauth2.client.registration.google.client-id=1032852271920-t65k1m3gconoiv63jje5j3r3potu8kso.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ===============================
# JWT CONFIGURATION
# ===============================
# Yeh secret kam se kam 256-bit (32 characters) ka hona chahiye securely sign karne ke liye
app.jwt.secret=your-256-bit-secret-key-change-in-production-1234567890
# Token expiry time: 86400000 milliseconds = 24 ghante
app.jwt.expiration=86400000

# ===============================
# SECURITY PATH CONFIGURATION
# ===============================
app.security.public-paths=/api/auth/**,/swagger-ui/**,/v3/api-docs/**,/h2-console/**,/actuator/health 
